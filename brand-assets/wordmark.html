<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Fredoka:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#fffbf2;--ink:#2b2440;--muted:#7a7392;--pink:#ff5ca8;--yellow:#ffc93c;--teal:#21c7b6;--teal-d:#16a596;
    --purple:#8a6cff;--orange:#ff7a45;--orange-d:#e8662f;--blue:#3da5ff;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:"Fredoka",sans-serif;padding:46px 56px;color:var(--ink);}
  .tag{color:var(--muted);font-weight:500;font-size:14px;margin-bottom:6px;}
  .lock{display:flex;align-items:center;gap:20px;margin-bottom:40px;}
  .mini{border-radius:24px;display:grid;place-items:center;background:var(--yellow);box-shadow:0 7px 0 rgba(43,36,64,.12);}
  .mini.lg{width:96px;height:96px;} .mini.lg svg{width:66px;height:66px;}
  .wm{font-family:"Baloo 2";font-weight:800;line-height:.95;}
  .one .wm{font-size:54px;}
  .stack .wm{font-size:46px;}
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute"><symbol id="wp" viewBox="0 0 100 100">
    <g stroke="#2b2440" stroke-width="3" stroke-linejoin="round">
      <rect x="70" y="20" width="13" height="62" rx="4" fill="#fff"/>
      <rect x="70" y="20" width="13" height="13" fill="var(--pink)"/><rect x="70" y="33" width="13" height="13" fill="var(--orange)"/>
      <rect x="70" y="46" width="13" height="13" fill="var(--teal)"/><rect x="70" y="59" width="13" height="13" fill="var(--purple)"/>
      <rect x="70" y="72" width="13" height="10" fill="var(--blue)"/><rect x="70" y="20" width="13" height="62" rx="4" fill="none"/>
    </g>
    <rect x="20" y="16" width="54" height="70" rx="9" fill="var(--teal)" stroke="#2b2440" stroke-width="4"/>
    <rect x="20" y="16" width="11" height="70" rx="5" fill="var(--teal-d)" stroke="#2b2440" stroke-width="4"/>
    <g transform="rotate(-30 47 51)">
      <rect x="40" y="37" width="14" height="42" rx="3" fill="var(--orange)" stroke="#2b2440" stroke-width="3.4"/>
      <path d="M40 38 L54 38 L47 23 Z" fill="var(--yellow)" stroke="#2b2440" stroke-width="3.4" stroke-linejoin="round"/>
      <path d="M43.5 31 L50.5 31 L47 23 Z" fill="var(--orange-d)" stroke="#2b2440" stroke-width="3" stroke-linejoin="round"/>
      <rect x="39.4" y="49" width="15.2" height="13" fill="#fff" stroke="#2b2440" stroke-width="3"/>
      <g stroke="#2b2440" stroke-width="2.4" stroke-linecap="round"><path d="M42.5 53 H51.5"/><path d="M42.5 58 H51.5"/></g>
    </g>
  </symbol></svg>

  <div>
    <div class="tag">A — two-tone, horizontal</div>
    <div class="lock one"><span class="mini lg"><svg><use href="#wp"/></svg></span>
      <span class="wm"><span style="color:var(--ink)">Wonder</span> <span style="color:var(--teal)">Pages</span></span></div>
  </div>

  <div>
    <div class="tag">B — solid ink</div>
    <div class="lock one"><span class="mini lg"><svg><use href="#wp"/></svg></span>
      <span class="wm" style="color:var(--ink)">Wonder Pages</span></div>
  </div>

  <div>
    <div class="tag">C — stacked</div>
    <div class="lock stack"><span class="mini lg"><svg><use href="#wp"/></svg></span>
      <span class="wm"><span style="color:var(--ink)">Wonder</span><br><span style="color:var(--orange)">Pages</span></span></div>
  </div>
</body>
</html>
