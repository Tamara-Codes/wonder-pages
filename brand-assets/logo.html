<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { display:flex; gap:48px; padding:48px; background:#161b22; align-items:center; }

  .avatar {
    width:800px; height:800px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  .avatar.green  { background:radial-gradient(circle at 50% 38%, #0f2a22 0%, #0d1117 70%); }
  .avatar.violet { background:radial-gradient(circle at 50% 38%, #1c1340 0%, #0d1117 70%); }

  .ring { position:absolute; inset:18px; border-radius:50%; }
  .green  .ring { border:6px solid rgba(0,255,156,.18); }
  .violet .ring { border:6px solid rgba(124,58,237,.22); }

  .mark { display:flex; align-items:baseline; font-family:"JetBrains Mono",monospace; line-height:1; }
  .brk { font-size:230px; font-weight:600; }
  .t   { font-size:380px; font-weight:700; padding:0 8px; }

  .green  .brk { color:#0bbf7a; }
  .green  .t   { color:#00ff9c; text-shadow:0 0 60px rgba(0,255,156,.55); }
  .violet .brk { color:#22d3ee; }
  .violet .t {
    background:linear-gradient(135deg,#a855f7 0%,#22d3ee 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 55px rgba(124,58,237,.55));
  }
</style>
</head>
<body>
  <div class="avatar green" id="green">
    <div class="ring"></div>
    <div class="mark"><span class="brk">&lt;/</span><span class="t">T</span><span class="brk">&gt;</span></div>
  </div>
  <div class="avatar violet" id="violet">
    <div class="ring"></div>
    <div class="mark"><span class="brk">&lt;/</span><span class="t">T</span><span class="brk">&gt;</span></div>
  </div>
</body>
</html>
