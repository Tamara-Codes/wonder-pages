<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#161b22;padding:50px;display:grid;grid-template-columns:repeat(3,1fr);gap:50px;
       font-family:"Space Grotesk",sans-serif;}
  .tile{display:flex;flex-direction:column;align-items:center;gap:18px;}
  .label{color:#7d8893;font-size:22px;font-family:"JetBrains Mono",monospace;}
  .avatar{width:360px;height:360px;border-radius:50%;position:relative;overflow:hidden;
          display:flex;align-items:center;justify-content:center;
          background:radial-gradient(circle at 50% 40%,#0f2a22 0%,#0d1117 72%);}
  .ring{position:absolute;inset:10px;border-radius:50%;border:3px solid rgba(0,255,156,.18);}
  .m{font-family:"JetBrains Mono",monospace;line-height:1;display:flex;color:#00ff9c;
     text-shadow:0 0 34px rgba(0,255,156,.5);}

  /* 1: refined </T> — centered, balanced */
  .v1{align-items:center;}
  .v1 .b{font-size:120px;font-weight:700;color:#0bbf7a;}
  .v1 .t{font-size:190px;font-weight:800;padding:0 4px;}

  /* 2: self-closing <T/> */
  .v2{align-items:center;}
  .v2 .b{font-size:120px;font-weight:700;color:#0bbf7a;}
  .v2 .t{font-size:190px;font-weight:800;padding:0 2px;}

  /* 3: simple tag <T> */
  .v3{align-items:center;}
  .v3 .b{font-size:140px;font-weight:600;color:#0bbf7a;}
  .v3 .t{font-size:200px;font-weight:800;padding:0 6px;}

  /* 4: braces { T } */
  .v4{align-items:center;}
  .v4 .b{font-size:150px;font-weight:500;color:#0bbf7a;}
  .v4 .t{font-size:185px;font-weight:800;padding:0 14px;}

  /* 5: terminal prompt  T_  */
  .v5{align-items:baseline;}
  .v5 .p{font-size:120px;font-weight:700;color:#0bbf7a;}
  .v5 .t{font-size:200px;font-weight:800;}
  .v5 .cur{width:34px;height:150px;background:#00ff9c;margin-left:14px;
           box-shadow:0 0 30px rgba(0,255,156,.6);align-self:center;}

  /* 6: TC tag </TC> */
  .v6{align-items:center;}
  .v6 .b{font-size:96px;font-weight:700;color:#0bbf7a;}
  .v6 .t{font-size:150px;font-weight:800;padding:0 4px;}
</style>
</head>
<body>
  <div class="tile"><div class="avatar"><div class="ring"></div>
    <div class="m v1"><span class="b">&lt;/</span><span class="t">T</span><span class="b">&gt;</span></div></div>
    <div class="label">1 &mdash; &lt;/T&gt; refined</div></div>

  <div class="tile"><div class="avatar"><div class="ring"></div>
    <div class="m v2"><span class="b">&lt;</span><span class="t">T</span><span class="b">/&gt;</span></div></div>
    <div class="label">2 &mdash; &lt;T/&gt; self-closing</div></div>

  <div class="tile"><div class="avatar"><div class="ring"></div>
    <div class="m v3"><span class="b">&lt;</span><span class="t">T</span><span class="b">&gt;</span></div></div>
    <div class="label">3 &mdash; &lt;T&gt; simple</div></div>

  <div class="tile"><div class="avatar"><div class="ring"></div>
    <div class="m v4"><span class="b">{</span><span class="t">T</span><span class="b">}</span></div></div>
    <div class="label">4 &mdash; { T } braces</div></div>

  <div class="tile"><div class="avatar"><div class="ring"></div>
    <div class="m v5"><span class="t">T</span><span class="cur"></span></div></div>
    <div class="label">5 &mdash; T_ terminal</div></div>

  <div class="tile"><div class="avatar"><div class="ring"></div>
    <div class="m v6"><span class="b">&lt;/</span><span class="t">TC</span><span class="b">&gt;</span></div></div>
    <div class="label">6 &mdash; &lt;/TC&gt; initials</div></div>
</body>
</html>
