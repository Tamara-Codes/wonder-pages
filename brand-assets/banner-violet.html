<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:2560px; height:1440px; }
  body{
    background:#0d1117;
    background-image:
      radial-gradient(circle at 50% 50%, rgba(124,58,237,.16) 0%, rgba(124,58,237,0) 40%),
      radial-gradient(rgba(255,255,255,.05) 1.4px, transparent 1.4px);
    background-size:auto, 40px 40px;
    display:flex; align-items:center; justify-content:center;
    font-family:"Space Grotesk",sans-serif; overflow:hidden;
  }
  .safe{ width:1546px; height:423px; display:flex; align-items:center; gap:70px; }

  .badge{
    flex:0 0 auto; width:300px; height:300px; border-radius:32px;
    background:radial-gradient(circle at 50% 40%, #1c1340 0%, #0a0f14 80%);
    border:2px solid rgba(124,58,237,.35);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 80px rgba(124,58,237,.22);
  }
  .mark{ display:flex; align-items:baseline; font-family:"JetBrains Mono",monospace; line-height:1; }
  .brk{ font-size:96px; font-weight:600; color:#22d3ee; }
  .t  { font-size:160px; font-weight:700; padding:0 6px;
        background:linear-gradient(135deg,#a855f7 0%,#22d3ee 100%);
        -webkit-background-clip:text; background-clip:text; color:transparent;
        filter:drop-shadow(0 0 38px rgba(124,58,237,.6)); }

  .copy{ display:flex; flex-direction:column; gap:18px; }
  .word{ font-size:120px; font-weight:700; color:#fff; letter-spacing:-2px; line-height:.95; }
  .word b{ background:linear-gradient(135deg,#a855f7 0%,#22d3ee 100%);
           -webkit-background-clip:text; background-clip:text; color:transparent; }
  .tag{ font-size:42px; font-weight:500; color:#9aa7b4; letter-spacing:.5px; }
  .handle{ margin-top:8px; font-family:"JetBrains Mono",monospace; font-size:34px;
           font-weight:600; color:#22d3ee; display:flex; align-items:center; gap:14px; }
  .handle::before{ content:""; width:14px; height:14px; border-radius:50%;
           background:linear-gradient(135deg,#a855f7,#22d3ee); box-shadow:0 0 14px rgba(124,58,237,.6); }
</style>
</head>
<body>
  <div class="safe">
    <div class="badge">
      <div class="mark"><span class="brk">&lt;/</span><span class="t">T</span><span class="brk">&gt;</span></div>
    </div>
    <div class="copy">
      <div class="word">Tamara <b>Codes</b></div>
      <div class="tag">Building micro-SaaS in public &mdash; one ship at a time</div>
      <div class="handle">@codewithtamara</div>
    </div>
  </div>
</body>
</html>
