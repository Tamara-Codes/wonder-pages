<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#fffbf2;--ink:#2b2440;--muted:#7a7392;
    --pink:#ff5ca8;--yellow:#ffc93c;--teal:#21c7b6;--purple:#8a6cff;--orange:#ff7a45;--blue:#3da5ff;--purple-d:#6f4fe0;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:"Fredoka",sans-serif;color:var(--ink);padding:48px 56px;}
  h2.section{font-family:"Baloo 2";font-weight:700;font-size:20px;color:var(--muted);margin:6px 0 26px;}
  .row{display:flex;gap:48px;flex-wrap:wrap;margin-bottom:50px;}
  .concept{display:flex;flex-direction:column;align-items:center;gap:16px;width:220px;}
  .tile{width:220px;height:220px;border-radius:48px;display:grid;place-items:center;
        box-shadow:0 10px 0 rgba(43,36,64,.12);}
  .tile svg{width:150px;height:150px;}
  .label{font-weight:600;font-size:18px;text-align:center;}
  .label b{font-family:"Baloo 2";font-weight:800;}

  /* wordmark lockups */
  .lock{display:flex;align-items:center;gap:18px;margin:8px 0 40px;}
  .lock .mini{width:84px;height:84px;border-radius:22px;display:grid;place-items:center;
        box-shadow:0 6px 0 rgba(43,36,64,.12);}
  .lock .mini svg{width:58px;height:58px;}
  .wordmark{font-family:"Baloo 2";font-weight:800;font-size:52px;line-height:1;display:flex;align-items:center;gap:4px;}
  .wordmark .spark{color:var(--pink);font-size:38px;margin-right:6px;}
</style>
</head>
<body>
  <h2 class="section">App icon — 4 concepts (Confetti Pop style)</h2>
  <div class="row">
    <!-- A: open book + sparkle -->
    <div class="concept">
      <div class="tile" style="background:var(--teal)">
        <svg viewBox="0 0 100 100">
          <path d="M50 34 C40 27 23 26 13 32 L13 74 C23 68 40 69 50 76 Z" fill="#fff" stroke="#2b2440" stroke-width="4" stroke-linejoin="round"/>
          <path d="M50 34 C60 27 77 26 87 32 L87 74 C77 68 60 69 50 76 Z" fill="#fff" stroke="#2b2440" stroke-width="4" stroke-linejoin="round"/>
          <path d="M50 34 V76" stroke="#2b2440" stroke-width="4"/>
          <g stroke="#cfd6e6" stroke-width="3" stroke-linecap="round"><path d="M22 44 H40"/><path d="M22 52 H40"/><path d="M60 44 H78"/><path d="M60 52 H78"/></g>
          <path d="M76 12 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 Z" fill="var(--yellow)" stroke="#2b2440" stroke-width="3" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="label"><b>A.</b> Open book + sparkle</div>
    </div>

    <!-- B: rainbow fanned pages -->
    <div class="concept">
      <div class="tile" style="background:#fff;border:3px solid #efe7da">
        <svg viewBox="0 0 100 100">
          <g stroke="#2b2440" stroke-width="3.5" stroke-linejoin="round">
            <g transform="rotate(-26 50 88)"><rect x="33" y="30" width="34" height="58" rx="7" fill="var(--pink)"/></g>
            <g transform="rotate(-13 50 88)"><rect x="33" y="28" width="34" height="60" rx="7" fill="var(--orange)"/></g>
            <g transform="rotate(13 50 88)"><rect x="33" y="28" width="34" height="60" rx="7" fill="var(--teal)"/></g>
            <g transform="rotate(26 50 88)"><rect x="33" y="30" width="34" height="58" rx="7" fill="var(--purple)"/></g>
            <rect x="33" y="24" width="34" height="64" rx="7" fill="#fff"/>
            <g stroke="#cfd6e6" stroke-width="3" stroke-linecap="round"><path d="M40 38 H60"/><path d="M40 46 H60"/><path d="M40 54 H56"/></g>
          </g>
          <path d="M22 16 l2.5 7 7 2.5 -7 2.5 -2.5 7 -2.5 -7 -7 -2.5 7 -2.5 Z" fill="var(--yellow)" stroke="#2b2440" stroke-width="3" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="label"><b>B.</b> Rainbow pages</div>
    </div>

    <!-- C: page with folded corner + star -->
    <div class="concept">
      <div class="tile" style="background:var(--pink)">
        <svg viewBox="0 0 100 100">
          <path d="M24 14 H62 L82 34 V86 H24 Z" fill="#fff" stroke="#2b2440" stroke-width="4" stroke-linejoin="round"/>
          <path d="M62 14 V34 H82 Z" fill="#ffe6f2" stroke="#2b2440" stroke-width="4" stroke-linejoin="round"/>
          <path d="M53 50 l5 11 12 1 -9 8 3 12 -11 -6 -11 6 3 -12 -9 -8 12 -1 Z" fill="var(--yellow)" stroke="#2b2440" stroke-width="3.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="label"><b>C.</b> Magic page + star</div>
    </div>

    <!-- D: W monogram + sparkle -->
    <div class="concept">
      <div class="tile" style="background:var(--yellow)">
        <svg viewBox="0 0 100 100">
          <path d="M14 24 L30 80 L50 40 L70 80 L86 24" fill="none" stroke="var(--purple-d)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M70 14 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 Z" fill="#fff" stroke="#2b2440" stroke-width="3" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="label"><b>D.</b> “W” monogram</div>
    </div>
  </div>

  <h2 class="section">Wordmark lockup (using concept A — swappable)</h2>
  <div class="lock">
    <div class="mini" style="background:var(--teal)">
      <svg viewBox="0 0 100 100">
        <path d="M50 34 C40 27 23 26 13 32 L13 74 C23 68 40 69 50 76 Z" fill="#fff" stroke="#2b2440" stroke-width="4" stroke-linejoin="round"/>
        <path d="M50 34 C60 27 77 26 87 32 L87 74 C77 68 60 69 50 76 Z" fill="#fff" stroke="#2b2440" stroke-width="4" stroke-linejoin="round"/>
        <path d="M50 34 V76" stroke="#2b2440" stroke-width="4"/>
        <path d="M76 12 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 Z" fill="var(--yellow)" stroke="#2b2440" stroke-width="3" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="wordmark"><span style="color:var(--ink)">Wonder</span>&nbsp;<span style="color:var(--teal)">Pages</span></div>
  </div>

  <div class="lock">
    <span class="wordmark"><span class="spark">✦</span><span style="color:var(--ink)">Wonder</span>&nbsp;<span style="color:var(--pink)">Pages</span></span>
  </div>
</body>
</html>
