<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{--bg:#fffbf2;--ink:#2b2440;--pink:#ff5ca8;--yellow:#ffc93c;--teal:#21c7b6;--teal-d:#16a596;
    --purple:#8a6cff;--orange:#ff7a45;--orange-d:#e8662f;--blue:#3da5ff;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);padding:48px;display:flex;align-items:center;gap:54px;}
  .tile{border-radius:52px;display:grid;place-items:center;box-shadow:0 11px 0 rgba(43,36,64,.12);background:var(--yellow);}
  .big{width:240px;height:240px;border-radius:52px;}
  .big svg{width:165px;height:165px;}
  .mid{width:96px;height:96px;border-radius:22px;}
  .mid svg{width:66px;height:66px;}
  .sm{width:48px;height:48px;border-radius:12px;}
  .sm svg{width:33px;height:33px;}
  .col{display:flex;flex-direction:column;gap:22px;align-items:center;}
</style>
</head>
<body>
  <!-- reusable symbol: activity book + crayon + rainbow page edge -->
  <svg width="0" height="0" style="position:absolute">
    <symbol id="wp" viewBox="0 0 100 100">
      <!-- rainbow fore-edge (the pages) -->
      <g stroke="#2b2440" stroke-width="3" stroke-linejoin="round">
        <rect x="70" y="20" width="13" height="62" rx="4" fill="#fff"/>
        <rect x="70" y="20" width="13" height="13" fill="var(--pink)"/>
        <rect x="70" y="33" width="13" height="13" fill="var(--orange)"/>
        <rect x="70" y="46" width="13" height="13" fill="var(--teal)"/>
        <rect x="70" y="59" width="13" height="13" fill="var(--purple)"/>
        <rect x="70" y="72" width="13" height="10" fill="var(--blue)"/>
        <rect x="70" y="20" width="13" height="62" rx="4" fill="none"/>
      </g>
      <!-- cover -->
      <rect x="20" y="16" width="54" height="70" rx="9" fill="var(--teal)" stroke="#2b2440" stroke-width="4"/>
      <rect x="20" y="16" width="11" height="70" rx="5" fill="var(--teal-d)" stroke="#2b2440" stroke-width="4"/>
      <!-- crayon emblem on cover -->
      <g transform="rotate(-30 47 51)">
        <rect x="40" y="37" width="14" height="42" rx="3" fill="var(--orange)" stroke="#2b2440" stroke-width="3.4"/>
        <path d="M40 38 L54 38 L47 23 Z" fill="var(--yellow)" stroke="#2b2440" stroke-width="3.4" stroke-linejoin="round"/>
        <path d="M43.5 31 L50.5 31 L47 23 Z" fill="var(--orange-d)" stroke="#2b2440" stroke-width="3" stroke-linejoin="round"/>
        <rect x="39.4" y="49" width="15.2" height="13" fill="#fff" stroke="#2b2440" stroke-width="3"/>
        <g stroke="#2b2440" stroke-width="2.4" stroke-linecap="round"><path d="M42.5 53 H51.5"/><path d="M42.5 58 H51.5"/></g>
      </g>
    </symbol>
  </svg>

  <div class="tile big"><svg><use href="#wp"/></svg></div>
  <div class="col">
    <div class="tile mid"><svg><use href="#wp"/></svg></div>
    <div class="tile sm"><svg><use href="#wp"/></svg></div>
  </div>
</body>
</html>
