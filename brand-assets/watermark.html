<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:300px;height:300px;}
  body{display:flex;align-items:center;justify-content:center;background:transparent;}
  /* bright + crisp so it stays legible overlaid on any video frame */
  .mk{font-family:"JetBrains Mono",monospace;line-height:1;display:flex;align-items:center;
      color:#00ff9c;
      filter:drop-shadow(0 2px 6px rgba(0,0,0,.9)) drop-shadow(0 0 14px rgba(0,0,0,.7));}
  .b{font-size:108px;font-weight:600;color:#19d98c;}
  .t{font-size:168px;font-weight:800;padding:0 4px;}
</style>
</head>
<body>
  <div class="mk"><span class="b">&lt;</span><span class="t">T</span><span class="b">&gt;</span></div>
</body>
</html>
