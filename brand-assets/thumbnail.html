<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1280px;height:720px;}
  body{
    background:#0d1117;
    background-image:
      radial-gradient(circle at 8% 0%, rgba(0,255,156,.16) 0%, rgba(0,255,156,0) 42%),
      radial-gradient(rgba(255,255,255,.045) 1.3px, transparent 1.3px);
    background-size:auto, 38px 38px;
    font-family:"Space Grotesk",sans-serif; overflow:hidden; position:relative;
    display:flex; flex-direction:column; justify-content:center;
    padding:70px 80px;
  }
  /* kicker: mark + channel name */
  .kicker{ display:flex; align-items:center; gap:18px; margin-bottom:34px; }
  .badge{ width:78px; height:78px; border-radius:16px;
    background:radial-gradient(circle at 50% 40%, #0f2a22 0%, #0a0f14 80%);
    border:2px solid rgba(0,255,156,.3); display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 30px rgba(0,255,156,.18); }
  .mk{ font-family:"JetBrains Mono",monospace; line-height:1; display:flex; align-items:center;
       color:#00ff9c; text-shadow:0 0 18px rgba(0,255,156,.5); }
  .mk .b{ font-size:30px; font-weight:700; color:#0bbf7a; }
  .mk .t{ font-size:46px; font-weight:800; padding:0 3px; }
  .chan{ font-family:"JetBrains Mono",monospace; font-size:30px; font-weight:700;
         letter-spacing:3px; color:#cdd6df; text-transform:uppercase; }

  /* headline — EDIT THIS PER VIDEO */
  .headline{ font-size:118px; font-weight:700; line-height:.96; color:#fff;
             letter-spacing:-2px; max-width:820px; text-transform:uppercase; }
  .headline .hl{ color:#00ff9c; text-shadow:0 0 40px rgba(0,255,156,.45); }

  /* episode / topic pill */
  .pill{ margin-top:40px; display:inline-flex; align-items:center; gap:12px; align-self:flex-start;
    font-family:"JetBrains Mono",monospace; font-size:26px; font-weight:700; color:#0d1117;
    background:#00ff9c; padding:12px 24px; border-radius:999px; letter-spacing:1px; }

  /* photo zone guide (delete the .photo div for final export, or drop a cutout in it) */
  .photo{ position:absolute; right:0; top:0; width:430px; height:720px;
    border-left:3px dashed rgba(0,255,156,.25);
    background:linear-gradient(270deg, rgba(0,255,156,.08), transparent);
    display:flex; align-items:flex-end; justify-content:center; padding-bottom:40px; }
  .photo span{ font-family:"JetBrains Mono",monospace; color:rgba(0,255,156,.45); font-size:22px;
    letter-spacing:2px; }
</style>
</head>
<body>
  <div class="photo"><span>// your photo / demo here</span></div>

  <div class="kicker">
    <div class="badge"><div class="mk"><span class="b">&lt;</span><span class="t">T</span><span class="b">&gt;</span></div></div>
    <div class="chan">Tamara Codes</div>
  </div>

  <div class="headline">I built a <span class="hl">SaaS</span> in <span class="hl">7 days</span></div>

  <div class="pill">BUILD IN PUBLIC &middot; #01</div>
</body>
</html>
