<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:512px;height:512px;}
  body{display:flex;align-items:center;justify-content:center;background:transparent;}
  .tile{width:512px;height:512px;border-radius:104px;
    background:radial-gradient(circle at 50% 38%, #15402f 0%, #0d1117 78%);
    border:8px solid rgba(0,255,156,.22);
    display:flex;align-items:center;justify-content:center;}
  .mk{font-family:"JetBrains Mono",monospace;line-height:1;display:flex;align-items:center;
      color:#00ff9c;text-shadow:0 0 40px rgba(0,255,156,.55);}
  .b{font-size:170px;font-weight:600;color:#0bbf7a;}
  .t{font-size:260px;font-weight:800;padding:0 6px;}
</style>
</head>
<body>
  <div class="tile"><div class="mk"><span class="b">&lt;</span><span class="t">T</span><span class="b">&gt;</span></div></div>
</body>
</html>
